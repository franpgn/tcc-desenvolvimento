# Cluster Infinispan, 3 nós, para experimentação local.
# Uso: podman-compose -f podman-compose.yml up -d
#
# Imagem oficial: quay.io/infinispan/server
# Porta Hot Rod: 11222
# Porta gerenciamento (REST/Console): 11222 (mesma; protocolos co-existem)
# A rede 'infinispan-net' é criada automaticamente por podman-compose.
#
# Para reproduzir cenários de falha (F1 crash, F3 latência), use os scripts em
# scripts/. Cenários F2 (partição) e F4 (state transfer) são opcionais em TCC-I.

version: "3.8"

networks:
  infinispan-net:
    driver: bridge

services:
  isn1:
    image: quay.io/infinispan/server:15.0
    container_name: isn1
    hostname: isn1
    environment:
      - USER=admin
      - PASS=infinispan
      - INFINISPAN_CLUSTER_NAME=cluster-tcc
    volumes:
      - ./infinispan-cluster.xml:/opt/infinispan/server/conf/infinispan.xml:ro
    ports:
      - "11222:11222"
    networks:
      - infinispan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "admin:infinispan", "http://localhost:11222/rest/v2/cache-managers/default/health/status"]
      interval: 5s
      timeout: 3s
      retries: 10

  isn2:
    image: quay.io/infinispan/server:15.0
    container_name: isn2
    hostname: isn2
    environment:
      - USER=admin
      - PASS=infinispan
      - INFINISPAN_CLUSTER_NAME=cluster-tcc
    volumes:
      - ./infinispan-cluster.xml:/opt/infinispan/server/conf/infinispan.xml:ro
    ports:
      - "11223:11222"
    networks:
      - infinispan-net
    depends_on:
      - isn1

  isn3:
    image: quay.io/infinispan/server:15.0
    container_name: isn3
    hostname: isn3
    environment:
      - USER=admin
      - PASS=infinispan
      - INFINISPAN_CLUSTER_NAME=cluster-tcc
    volumes:
      - ./infinispan-cluster.xml:/opt/infinispan/server/conf/infinispan.xml:ro
    ports:
      - "11224:11222"
    networks:
      - infinispan-net
    depends_on:
      - isn1
